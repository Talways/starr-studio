<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>STARR Studio</title>
<link rel="stylesheet" href="styles.css?v=23">
<link rel="manifest" href="manifest.webmanifest">
</head>
<body>

<!-- ШАГ 1: СЦЕНАРИЙ -->
<section id="screen-script" class="screen active">
  <header class="topbar">
    <div class="logo">STARR<span>studio</span></div>
  </header>
  <div class="scroll">
    <h1 class="h1">Сценарий</h1>
    <p class="muted">Вставь готовый сценарий — прочитаешь его с суфлёра во время записи.</p>
    <textarea id="script" class="field" rows="12" placeholder="Вставь сюда текст сценария…"></textarea>
    <button id="to-record" class="btn primary full">Запись →</button>
  </div>
</section>

<!-- ШАГ 2: ЗАПИСЬ -->
<section id="screen-record" class="screen">
  <div class="cam-wrap">
    <video id="cam" playsinline autoplay muted></video>
    <button id="cam-msg" class="cam-msg hidden"></button>

    <div id="teleprompter" class="teleprompter">
      <div id="tele-text" class="tele-text"></div>
    </div>

    <div id="countdown" class="countdown hidden"></div>
    <button id="btn-discard" class="discard-btn hidden">↩︎ Сбросить дубль</button>

    <div class="rec-controls">
      <button id="btn-back" class="round small">‹</button>
      <button id="btn-pause" class="round small hidden" title="Пауза">⏸</button>
      <button id="btn-record" class="record-btn"><span class="dot"></span></button>
      <div class="rec-right">
        <button id="btn-flip" class="round small" title="Камера">⟳</button>
        <div id="rec-timer" class="rec-timer">0:00</div>
      </div>
    </div>

    <div class="tele-speed">
      <span class="muted small">Скорость суфлёра</span>
      <input id="speed" type="range" min="0.4" max="2.4" step="0.1" value="1.0">
    </div>
  </div>
</section>

<!-- ШАГ 3: РЕЗУЛЬТАТ -->
<section id="screen-result" class="screen">
  <div class="scroll center">
    <h1 class="h1">Готово 🎬</h1>
    <video id="result-video" class="result-video" controls playsinline></video>
    <button id="btn-save" class="btn primary full">⬇ Сохранить / Поделиться</button>
    <button id="btn-new" class="btn ghost full">+ Новый ролик</button>
    <p class="muted small" id="result-note"></p>
  </div>
</section>

<div id="proc" class="proc hidden"><div class="spinner"></div><div id="proc-msg">Собираю видео…</div></div>

<script src="app.js?v=23"></script>
</body>
</html>
